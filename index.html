<!DOCTYPE html>
<html>
  <head>
    <base href="%FLUTTER_BASE_HREF%">
    <meta charset="UTF-8">
    <title>Multilingual Translator</title>
    <script>
      var flet = {
        pyodide: true,
        webSocketEndpoint: "", // 静的配信(GitHub Pages)では空にする
        entrypointBaseUrl: "%FLUTTER_BASE_HREF%",
        assetBase: "%FLUTTER_BASE_HREF%",
        pythonModuleName: "mytranslator2",
        appPackageUrl: "assets/app/app.zip"
      };
    </script>
    <script src="python.js"></script>
    <style>
      /* ローディング画面のスタイル */
      #loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #ffffff;
      }
      .loader {
        border: 6px solid #f3f3f3;
        border-top: 6px solid #2196F3; /* Flet/Flutterっぽい青 */
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .text {
        font-family: sans-serif;
        margin-top: 15px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loader"></div>
      <div class="text">Now Loading...</div>
    </div>
    <script src="flutter.js" defer></script>
    <script>
      window.addEventListener('load', function(ev) {
        _flutter.loader.loadEntrypoint({
          serviceWorker: {
            serviceWorkerVersion: "{{ revised_service_worker_version }}",
          },
          onEntrypointLoaded: function(engineInitializer) {
            engineInitializer.initializeEngine().then(function(appRunner) {
              appRunner.runApp().then(function() {
                // ここで即座に消さず、Fletの準備完了を待つ
                flet.flutterAppLoaded.then(function() {
                  var loading = document.getElementById('loading');
                  if (loading) {
                    // フェードアウトさせてから消す
                    loading.style.transition = 'opacity 0.5s';
                    loading.style.opacity = '0';
                    setTimeout(() => loading.remove(), 500);
                  }
                });
              });
            });
          }
        });
      });
    </script>
  </body>
</html>
